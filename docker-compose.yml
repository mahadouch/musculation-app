services:
  backend:
    build: ./backend
    container_name: muscu-backend
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - db-data:/app
    environment:
      - NODE_ENV=production

  frontend:
    build: ./frontend
    container_name: muscu-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
